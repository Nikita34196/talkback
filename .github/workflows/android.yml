name: Build TalkBack

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # кнопка ручного запуска

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Setup Gradle 7.6.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6.4-bin.zip -P /tmp/
          sudo unzip -q /tmp/gradle-7.6.4-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6.4/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assemblePhoneDebug --no-daemon --stacktrace

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talkback-debug
          path: "**/*.apk"
          retention-days: 30
